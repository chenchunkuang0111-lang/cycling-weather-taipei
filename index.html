.metric{background:var(--bg3);border-radius:10px;padding:9px 10px}

.mfill{height:100%;border-radius:3px}

// API LAYER: Triple fallback weather fetching
// \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550
let weatherSrc='', weatherData=null, radarData=null, radarSrc='';
const now=new Date();

async function fetchWeather(){
  const routeArr=Object.values(ROUTES);
  const lats=routeArr.map(r=>r.lat);
  const lons=routeArr.map(r=>r.lon);
  const latStr=lats.join(',');
  const lonStr=lons.join(',');
  try{
    setText('\u6B63\u5728\u9023\u7DDA Open-Meteo API...','\u4F86\u6E90\uFF1Aapi.open-meteo.com\uFF08\u4E3B\u8981\u4F86\u6E90\uFF09');
    const u='https://api.open-meteo.com/v1/forecast?latitude='+latStr+'&longitude='+lonStr+'&hourly=temperature_2m,apparent_temperature,precipitation,precipitation_probability,wind_speed_10m,wind_direction_10m,weather_code&daily=temperature_2m_max,temperature_2m_min,precipitation_sum,precipitation_probability_max,wind_speed_10m_max,wind_direction_10m_dominant,weather_code&timezone=Asia%2FTaipei&forecast_days=3';
    const r=await fetch(u,{cache:'no-store'});
    if(!r.ok)throw new Error('HTTP '+r.status);
    const d=await r.json();
    const arr=Array.isArray(d)?d:[d];
    if(arr.length===routeArr.length){weatherSrc='Open-Meteo';return arr;}
    throw new Error('Unexpected response format');
  }catch(e1){
    console.warn('Primary (Open-Meteo) failed:',e1.message);
    try{
      setText('\u5207\u63DB Open-Meteo \u55AE\u9EDE\u6A21\u5F0F...','\u4F86\u6E90\uFF1AOpen-Meteo\uFF08\u55AE\u9EDE\u91CD\u8A66\uFF09');
      const results=[];
      for(const r of routeArr){
        const u2='https://api.open-meteo.com/v1/forecast?latitude='+r.lat+'&longitude='+r.lon+'&hourly=temperature_2m,apparent_temperature,precipitation,precipitation_probability,wind_speed_10m,wind_direction_10m,weather_code&daily=temperature_2m_max,temperature_2m_min,precipitation_sum,precipitation_probability_max,wind_speed_10m_max,wind_direction_10m_dominant,weather_code&timezone=Asia%2FTaipei&forecast_days=3';
        const rr=await fetch(u2,{cache:'no-store'});
        if(!rr.ok)throw new Error('HTTP '+rr.status);
        results.push(await rr.json());
      }
      weatherSrc='Open-Meteo (\u55AE\u9EDE)';return results;
    }catch(e2){
      console.warn('Backup 1 (Open-Meteo single) failed:',e2.message);
      try{
        setText('\u5207\u63DB MET Norway...','\u4F86\u6E90\uFF1Aapi.met.no\uFF08\u5099\u7528\uFF09');
        const results=[];
        for(const r of routeArr){
          const u3='https://api.met.no/weatherapi/locationforecast/2.0/compact?lat='+r.lat+'&lon='+r.lon;
          const rr=await fetch(u3);
          if(!rr.ok)throw new Error('HTTP '+rr.status);
          results.push(await rr.json());
        }
        weatherSrc='MET Norway';return results;
      }catch(e3){
        console.warn('Backup 2 (MET Norway) failed:',e3.message);
        try{
          setText('\u5207\u63DB wttr.in...','\u4F86\u6E90\uFF1Awttr.in\uFF08\u5099\u7528\uFF09');
          const results=[];
          for(const r of routeArr){
            const u4='https://wttr.in/'+r.lat+','+r.lon+'?format=j1';
            const rr=await fetch(u4,{cache:'no-store'});
            if(!rr.ok)throw new Error('HTTP '+rr.status);
            results.push(await rr.json());
          }
          weatherSrc='wttr.in';return results;
        }catch(e4){
          console.warn('Backup 3 (wttr.in) failed:',e4.message);
          throw new Error('All weather sources failed');
        }
      }
    }
  }
}

function fetchTimeout(url,ms){
  return Promise.race([
    fetch(url),
    new Promise((_,rej)=>setTimeout(()=>rej(new Error('Timeout')),ms))
  ]);
}

function convertWttr(results){
  // Convert wttr.in format to Open-Meteo-like hourly arrays
  return results.map(d=>{
    const cur=d.current_condition?.[0]||{};
    const forecasts=d.weather||[];
    const hourly={time:[],temperature_2m:[],apparent_temperature:[],precipitation_probability:[],wind_speed_10m:[],wind_direction_10m:[]};
    forecasts.forEach((day,di)=>{
      (day.hourly||[]).forEach(h=>{
        const dt=`${day.date}T${String(h.time).padStart(4,'0').slice(0,2)}:00`;
        hourly.time.push(dt);
        hourly.temperature_2m.push(parseFloat(h.tempC));
        hourly.apparent_temperature.push(parseFloat(h.FeelsLikeC));
        hourly.precipitation_probability.push(parseFloat(h.chanceofrain||0));
        hourly.wind_speed_10m.push(parseFloat(h.windspeedKmph));
        hourly.wind_direction_10m.push(parseFloat(h.winddirDegree));
      });
    });
    return{hourly};
  });
}

function getDefaultWeather(){
  return ROUTES.map(r=>{
    const hours=72;const hourly={time:[],temperature_2m:[],apparent_temperature:[],precipitation_probability:[],wind_speed_10m:[],wind_direction_10m:[]};
    for(let i=0;i<hours;i++){
      const d=new Date(now);d.setHours(d.getHours()+i);
      hourly.time.push(d.toISOString().slice(0,16));
      const hr=d.getHours();const t=hr>=6&&hr<=14?22+Math.sin((hr-6)/8*Math.PI)*6:18;
      hourly.temperature_2m.push(Math.round(t*10)/10);
      hourly.apparent_temperature.push(Math.round((t-2)*10)/10);
      hourly.precipitation_probability.push(hr>=14?Math.min(80,(hr-14)*12):Math.max(0,5));
      hourly.wind_speed_10m.push(Math.round((3+Math.sin(hr/6)*2)*10)/10);
      hourly.wind_direction_10m.push(180);
    }
    return{hourly};
  });
}

async function fetchRadar(){
  const NCDR_BASE='https://watch.ncdr.nat.gov.tw';
  try{
    const now2=new Date();const lag=20,totMin=now2.getUTCHours()*60+now2.getUTCMinutes();
    const baseMin=Math.floor((totMin-lag)/10)*10;const bHr=Math.floor(baseMin/60)%24,bMn=baseMin%60;
    const baseDate=new Date(Date.UTC(now2.getUTCFullYear(),now2.getUTCMonth(),now2.getUTCDate(),bHr,bMn,0));
    const fU=d=>{const y=d.getUTCFullYear(),m=String(d.getUTCMonth()+1).padStart(2,'0'),dy=String(d.getUTCDate()).padStart(2,'0'),h=String(d.getUTCHours()).padStart(2,'0'),mi=String(d.getUTCMinutes()).padStart(2,'0');return{YM:y+m,YMD:y+m+dy,full:y+m+dy+h+mi};};
    const fTW=d=>{const tw=new Date(d.getTime()+28800000);return{YM:String(tw.getUTCFullYear())+String(tw.getUTCMonth()+1).padStart(2,'0'),YMD:String(tw.getUTCFullYear())+String(tw.getUTCMonth()+1).padStart(2,'0')+String(tw.getUTCDate()).padStart(2,'0')};};
    const toTW=d=>d;const frames=[];
    for(let off=-30;off<0;off+=10){const t=new Date(baseDate.getTime()+off*60000);const u=fU(t),tw=fTW(t);frames.push({time:toTW(t),offset:off,type:'obs',url:NCDR_BASE+'/00_Wxmap/7F13_NOWCAST/OBS/'+tw.YM+'/'+tw.YMD+'/obs_s'+u.full+'.png'});}
    const bU=fU(baseDate),bTW=fTW(baseDate);
    for(let s=0;s<=12;s++){const t=new Date(baseDate.getTime()+s*600000);frames.push({time:toTW(t),offset:s*10,type:'nowcast',url:NCDR_BASE+'/00_Wxmap/7F13_NOWCAST/'+bTW.YM+'/'+bTW.YMD+'/'+bU.full+'/nowcast_'+bU.full+'_s'+String(s).padStart(2,'0')+'.png'});}
    await new Promise((res,rej)=>{const img=new Image();img.onload=res;img.onerror=rej;img.src=frames[3].url;setTimeout(rej,8000);});
    radarFrames=frames;radarHost=NCDR_BASE;radarSrc='NCDR';radarFetchTime=Date.now();return;
  }catch(e1){console.warn('NCDR failed:',e1.message);}
  try{
    const now2=new Date();const frames=[];
    for(let off=-20;off<=0;off+=10){const t=new Date(now2.getTime()+off*60000);const y=t.getUTCFullYear(),m=String(t.getUTCMonth()+1).padStart(2,'0'),d=String(t.getUTCDate()).padStart(2,'0'),h=String(t.getUTCHours()).padStart(2,'0'),mi=String(Math.floor(t.getUTCMinutes()/10)*10).padStart(2,'0');const tw=new Date(t.getTime()+28800000);frames.push({time:tw,offset:off,type:'cwa',url:'https://www.cwa.gov.tw/Data/radar/CV1_TW_3600_'+y+m+d+h+mi+'.png'});}
    await new Promise((res,rej)=>{const img=new Image();img.onload=res;img.onerror=rej;img.src=frames[frames.length-1].url;setTimeout(rej,8000);});
    radarFrames=frames;radarHost='https://www.cwa.gov.tw';radarSrc='CWA';radarFetchTime=Date.now();return;
  }catch(e2){console.warn('CWA failed:',e2.message);}
  try{
    const r=await fetchTimeout('https://api.rainviewer.com/public/weather-maps.json',8000);
    radarData=await r.json();const past=(radarData.radar&&radarData.radar.past)||[];const nowcast=(radarData.radar&&radarData.radar.nowcast)||[];
    radarFrames=[...past,...nowcast].map(f=>({time:new Date(f.time*1000),offset:0,type:'rainviewer',path:f.path}));
    radarHost=radarData.host||'https://tilecache.rainviewer.com';radarSrc='RainViewer';
  }catch(e3){console.warn('All radar sources failed:',e3.message);radarFrames=[];radarHost='';radarSrc='';}
}

// DATA PROCESSING: Convert raw API \u2192 route scores & segment data
// \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550
function windAlign(windDirDeg,climbBear){
  const windTo=(windDirDeg+180)%360;
  const diff=((windTo-climbBear+540)%360)-180;
  return Math.cos(diff*Math.PI/180);
}


function bf(ms){const BF_BOUNDS=[0,0.3,1.6,3.4,5.5,8.0,10.8,13.9,17.2,20.8,24.5,28.5,32.7,99];if(ms<0.3)return'0.0';for(let i=1;i<BF_BOUNDS.length-1;i++){if(ms<BF_BOUNDS[i+1]){const frac=(ms-BF_BOUNDS[i])/(BF_BOUNDS[i+1]-BF_BOUNDS[i]);return(i+frac).toFixed(1);}}return'12.0';}
function processWeather(raw){
  const processed=[];
  Object.values(ROUTES).forEach((route,ri)=>{
    const h=raw[ri]?.hourly;if(!h)return;
    const nowIdx=findNowIdx(h.time);
    // Build 3 day scenarios
    const days=[0,1,2].map(di=>{
      const startIdx=di===0?nowIdx:findHourIdx(h.time,di,6);
      const sliceLen=9;// 9 points = 4h at 30min intervals \u2192 use every-other hourly
      const idxs=[];for(let i=0;i<sliceLen;i++){const idx=startIdx+Math.round(i*0.5);if(idx<h.time.length)idxs.push(idx);else idxs.push(h.time.length-1);}
      const segsData=route.segs.map((seg,si)=>{
        // \u6839\u64DA\u8DEF\u6BB5\u9810\u8A08\u62B5\u9054\u6642\u9593\u9078\u53D6\u6B63\u78BA\u7684\u6C23\u8C61\u5C0F\u6642\u7D22\u5F15\uFF08\u5047\u8A2D\u5E73\u5747\u722C\u5347\u901F\u5EA6 12km/h\uFF09
        const estimatedRideHrs=Math.round((route.dist||10)*(seg.elFrac||0)/12);
        const segIdx=Math.min(startIdx+estimatedRideHrs,h.time.length-1);
        // \u6839\u64DA\u6D77\u62D4\u5DEE\u4FEE\u6B63\u6EAB\u5EA6\uFF08\u6A19\u6E96\u5927\u6C23\u905E\u6E1B\u7387 -6.5\u00B0C/1000m\uFF09
        const elevDelta=(route.elev||0)*(seg.elFrac||0);
        const tempAdj=-(elevDelta/1000)*6.5;
        const t=Math.round((h.temperature_2m[segIdx]||22)+tempAdj);
        const f=Math.round((h.apparent_temperature[segIdx]||(h.temperature_2m[segIdx]||22)-2)+tempAdj);
        const rain=Math.round(h.precipitation_probability[segIdx]||0);
        // \u98A8\u901F/\u98A8\u5411\u7528\u51FA\u767C\u6642\u523B startIdx\uFF0C\u4E0D\u52A0\u9A0E\u884C\u504F\u79FB\uFF08\u986F\u793A\u5373\u6642\u98A8\u6CC1\uFF09
        const ws=Math.round((h.wind_speed_10m[startIdx]||5)/3.6*10)/10;// km/h\u2192m/s
        const wd=h.wind_direction_10m[startIdx]||180;
        const a=Math.round(windAlign(wd,seg.bear)*100)/100;
        const road=rain>=45?'wet':rain>=20?'damp':'dry';
        const pr=Math.max(10,Math.min(98,Math.round(85-rain*0.6+(a*ws*2.5)-(seg.elFrac*8))));
        // Build timeline
        const tl={rain:[],road:[],windMs:[],windAlign:[]};
        idxs.forEach(idx=>{
          const rn=Math.round(h.precipitation_probability[idx]||0);
          tl.rain.push(rn);tl.road.push(rn>=45?'wet':rn>=20?'damp':'dry');
          tl.windMs.push(Math.round((h.wind_speed_10m[idx]||5)/3.6*10)/10);
          tl.windAlign.push(Math.round(windAlign(h.wind_direction_10m[idx]||180,seg.bear)*100)/100);
        });
        const rdTxt=road==='wet'?'\u6F6E\u6FD5\u00B7\u964D\u96E8\u4E2D':road==='damp'?'\u5FAE\u6FD5\u00B7\u6709\u964D\u96E8\u6A5F\u7387':'\u4E7E\u71E5\u00B7\u8DEF\u9762\u72C0\u614B\u826F\u597D';
        const dirs=['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'];
        const wdir=dirs[Math.round(wd/22.5)%16];
        return{...seg,t,f,rain,road,rd:rdTxt,w:{ms:ws,dir:wdir,a},pr,tl};
      });
      // Overall score
      const avgRain=segsData.reduce((s,x)=>s+x.rain,0)/segsData.length;
      const avgPr=Math.round(segsData.reduce((s,x)=>s+x.pr,0)/segsData.length);
      const avgA=segsData.reduce((s,x)=>s+x.w.a,0)/segsData.length;
      const score=Math.max(15,Math.min(98,avgPr));
      const verdict=score>=80?'\u72C0\u614B\u826F\u597D\uFF0C\u628A\u63E1\u7576\u524D\u6642\u6BB5':score>=65?'\u689D\u4EF6\u4E2D\u4E0A\uFF0C\u9069\u5408\u7DF4\u7FD2':score>=50?'\u689D\u4EF6\u4E00\u822C\uFF0C\u6CE8\u610F\u5B89\u5168':score>=35?'\u4E0D\u5EFA\u8B70\u51FA\u767C\uFF0C\u8DEF\u6CC1\u5DEE':'\u5F37\u70C8\u4E0D\u5EFA\u8B70\u51FA\u767C';
      const reason=`\u5E73\u5747\u964D\u96E8 ${Math.round(avgRain)}%\u3001\u98A8\u5411\u5C0D\u9F4A ${Math.round(avgA*100)}%\u3001\u7834\u7D00\u9304\u6307\u6578\u5747\u503C ${avgPr}\u3002`;
      const wl=score>=75?'\u6700\u4F73\u8996\u7A97\u00B7\u73FE\u5728\u8D77':score>=60?'\u689D\u4EF6\u6F38\u8F49\u00B7\u628A\u63E1\u6642\u9593':'\u4ECA\u65E5\u689D\u4EF6\u4E0D\u4F73';
      const wt=score>=75?'g':score>=55?'w':'b';
      const weakest=segsData.reduce((w,s)=>s.pr<w.pr?s:w,segsData[0]);
      // Route-level timeline (use first seg's timeline as base)
      const rtl=segsData[0].tl;
      return{score,verdict,reason,windowLabel:wl,windowType:wt,segs:segsData,tl:rtl,
        surf:{state:avgRain<15?'\u5168\u7DDA\u504F\u4E7E':avgRain<40?'\u90E8\u5206\u8DEF\u6BB5\u5FAE\u6FD5':'\u591A\u6BB5\u6F6E\u6FD5',
              stateCls:avgRain<15?'good':avgRain<40?'warn':'bad',
              weakest:`${weakest.n}\u00B7\u7834\u7D00\u9304\u6307\u6578\u6700\u4F4E (${weakest.pr})`,
              window:score>=70?'\u73FE\u5728\u70BA\u6700\u4F73\u6642\u6BB5':'\u6CE8\u610F\u5929\u6C23\u8B8A\u5316',
              hazards:avgRain>=40?'\u964D\u96E8\u8DEF\u6ED1\u00B7\u715E\u8ECA\u589E\u8DDD':'\u5348\u5F8C\u96F7\u9663\u96E8\u00B7\u7A1C\u7DDA\u98A8\u5927'}};
    });
    processed.push({...route,days});
  });
  return processed;
}

function findNowIdx(times){
  // \u81EA\u52D5\u6821\u6B63\uFF1A\u4F7F\u7528\u53F0\u5317\u6642\u5340(UTC+8)\u5C0D\u61C9API\u7684Asia/Taipei\u6642\u9593
  const taipeiNow=new Date(now.toLocaleString('en-US',{timeZone:'Asia/Taipei'}));
  const n=taipeiNow.getFullYear()+'-'+String(taipeiNow.getMonth()+1).padStart(2,'0')+'-'+String(taipeiNow.getDate()).padStart(2,'0')+'T'+String(taipeiNow.getHours()).padStart(2,'0');
  for(let i=0;i<times.length;i++){if(times[i]&&times[i].startsWith(n))return i;}
  return 0;
}
function findHourIdx(times,dayOffset,hour){
  const d=new Date(now);d.setDate(d.getDate()+dayOffset);d.setHours(hour,0,0,0);
  const target=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}T${String(hour).padStart(2,'0')}`;
  for(let i=0;i<times.length;i++){if(times[i]&&times[i].startsWith(target))return i;}
  return Math.min(dayOffset*24+hour,times.length-1);
}

function msToBeaufort(ms){const BF_BOUNDS=[0,0.3,1.6,3.4,5.5,8.0,10.8,13.9,17.2,20.8,24.5,28.5,32.7,99];if(ms<0.3)return 0;for(let i=1;i<BF_BOUNDS.length-1;i++){if(ms<BF_BOUNDS[i+1]){const frac=(ms-BF_BOUNDS[i])/(BF_BOUNDS[i+1]-BF_BOUNDS[i]);return parseFloat((i+frac).toFixed(1));}}return 12;}
function sTL(seg,tb,di){
 if(!seg.tl)return'';
 const s=seg.tl;

 const xs=Array.from({length:n},(_,i)=>pL+(iW*i/(n-1)));

 const dY=rY+rH+6,dH=10;
 const arY=dY+dH+10,arH=48;
 const wY=arY+arH+6,wH=36;
 const xlY=wY+wH+14;
 const H=xlY+4;
 const RC={dry:'#4CAF50',damp:'#FFC107',wet:'#E53935'};

 const arrows=xs.map((x,i)=>{

  const col=isTail?'#4CAF50':'#E53935',dir=isTail?1:-1;

   '<polygon points="'+x2+','+ay+' '+(x2-dir*hl)+','+(ay-hw/2)+' '+(x2-dir*hl)+','+(ay+hw/2)+'" fill="'+col+'"/>'+
   '<text x="'+x+'" y="'+pctY+'" text-anchor="middle" font-size="9" fill="'+col+'" font-weight="700">'+pct+'%</text>';
 }).join('');
 const maxMs=12;
 const windBars=s.windMs.map((v,i)=>{

 }).join('');
 const xl=xs.map((x,i)=>{if(i%2!==0)return'';const d=new Date(tb.getTime()+i*30*60000);return'<text x="'+x+'" y="'+xlY+'" text-anchor="middle" font-size="9" fill="#666">'+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0')+'</text>';}).join('');
 const vLine='<line x1="'+xs[0]+'" y1="'+(pT-2)+'" x2="'+xs[0]+'" y2="'+(wY+wH)+'" stroke="#e8e8e8" stroke-width=".5" stroke-dasharray="2 2"/>';

function elevProfile(r, segsData){
  const W=640,H=72,pL=8,pR=8,pT=10,pB=20,iW=W-pL-pR,iH=H-pT-pB;
  const segs=r.segs;if(!segs||segs.length<2)return'';
  const pts=[];let elev=0;pts.push({km:0,elev:0});
  segs.forEach(seg=>{
    const mM=seg.m.match(/([\d.]+)[\u2013-]([\d.]+)\s*km/);
    const gM=seg.m.match(/[\u5761]\s*(\d+)%/);
    if(!mM||!gM)return;
    const kmEnd=parseFloat(mM[2]),grade=parseFloat(gM[1])/100;
    const dist=kmEnd-(pts[pts.length-1].km||0);
    elev+=dist*1000*grade;pts.push({km:kmEnd,elev});
  });
  const totalKm=pts[pts.length-1].km||r.dist||10;
  const totalElev=Math.max(pts[pts.length-1].elev,50);
  const xS=iW/totalKm,yS=iH/totalElev;
  const toX=km=>pL+km*xS,toY=e=>pT+iH-e*yS;
  const RC2={dry:'rgba(76,175,80,.55)',damp:'rgba(255,193,7,.55)',wet:'rgba(229,57,53,.55)'};
  let fills='',lines='',divs='',labels='';
  pts.forEach((p,i)=>{
    if(i===0)return;
    const prev=pts[i-1];
    const x1=toX(prev.km),x2=toX(p.km),y1=toY(prev.elev),y2=toY(p.elev),yBase=toY(0);
    const col=segsData&&segsData[i-1]?RC2[segsData[i-1].road]||RC2.dry:RC2.dry;
    fills+='<path d="M'+x1+','+y1+' L'+x2+','+y2+' L'+x2+','+yBase+' L'+x1+','+yBase+' Z" fill="'+col+'"/>';
    lines+=(i===1?'M'+x1+','+y1:'')+'L'+x2+','+y2;
    if(i<pts.length-1)divs+='<line x1="'+x2+'" y1="'+pT+'" x2="'+x2+'" y2="'+yBase+'" stroke="rgba(255,255,255,.15)" stroke-width="1"/>';
    const gM=segs[i-1].m.match(/[\u5761]\s*(\d+)%/);
    if(gM){const mx=(x1+x2)/2,my=Math.min((y1+y2)/2-4,pT+iH-8);labels+='<text x="'+mx+'" y="'+Math.max(pT+10,my)+'" text-anchor="middle" font-size="9" fill="rgba(255,255,255,.75)">'+gM[1]+'%</text>';}
  });

}

// \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550
// NCDR \u5730\u7406\u7BC4\u570D\uFF08\u5B8C\u5168\u8986\u84CB\u6295\u5F71\u756B\u5E03\uFF09
const NCDR_DOMAIN={slon:117.1595,elon:123.9804,slat:21.2646,elat:26.5353};
// canvas \u986F\u793A\u8A2D\u5B9A\uFF08\u8207 NCDR 3300x2550 \u6BD4\u4F8B\u4E00\u81F4\uFF09

// D3 equirectangular \u6295\u5F71\uFF08\u8207\u843D\u96E8\u5C0F\u5E6B\u624B\u76F8\u540C\uFF1Acenter=[120.57,23.9], scale=4200*(w/500)\uFF09
const PROJ_CENTER=[120.57,23.9];
const DEG2RAD=Math.PI/180;
function projX(lon,w){return(lon-117.1595)/(123.9804-117.1595)*w;}
function projY(lat,h){return(26.5353-lat)/(26.5353-21.2646)*h;}

function drF(st){
  const cv=document.getElementById('rCV');if(!cv)return;
  const ctx=cv.getContext('2d');
  const W=cv.width,H=cv.height;
  ctx.clearRect(0,0,W,H);

  const f=radarFrames.length>0?radarFrames[Math.min(st,radarFrames.length-1)]:null;
  const wrap=cv.parentElement;wrap.style.position='relative';

  // 1. \u885B\u661F\u5E95\u5716 (CSS img, bypass CORS)
  let bkEl=document.getElementById('radarBkImg');
  if(!bkEl){bkEl=document.createElement('img');bkEl.id='radarBkImg';
    bkEl.style.cssText='position:absolute;inset:0;width:100%;height:100%;object-fit:fill;z-index:0;';
    wrap.insertBefore(bkEl,cv);}
  const BK_URL='https://watch.ncdr.nat.gov.tw/appv2/module/nowcast/icon/radar_nowcast_bk_hi.jpg';
  if(bkEl.src!==BK_URL)bkEl.src=BK_URL;

  // 2. NCDR\u96F7\u9054\u56DE\u6CE2\u5716 (CSS img, bypass CORS)
  let dbzEl=document.getElementById('radarDbzImg');
  if(!dbzEl){dbzEl=document.createElement('img');dbzEl.id='radarDbzImg';
    dbzEl.style.cssText='position:absolute;inset:0;width:100%;height:100%;object-fit:fill;z-index:1;opacity:0.82;';
    wrap.insertBefore(dbzEl,cv);}
  const fUrl=f?.url||null;
  if(fUrl&&dbzEl.src!==fUrl)dbzEl.src=fUrl;

  // 3. \u53F0\u7063\u7E23\u5E02\u908A\u754C\u7DDA (canvas, equirectangular projection)
  cv.style.cssText='position:absolute;inset:0;width:100%;height:100%;z-index:2;';
  if(window._bdGeo){
    ctx.save();
    ctx.beginPath();ctx.rect(0,0,W,H);ctx.clip();
    ctx.strokeStyle='rgba(255,255,255,0.92)';ctx.lineWidth=2.8;ctx.lineJoin='round';ctx.lineCap='round';
    window._bdGeo.features.forEach(ft=>{
      const geom=ft.geometry;if(!geom)return;
      const polys=geom.type==='MultiPolygon'?geom.coordinates:
                  geom.type==='Polygon'?[geom.coordinates]:[];
      polys.forEach(poly=>{
        const ring=poly[0];
        if(!ring||ring.length<2)return;
        ctx.beginPath();
        ring.forEach(([lo,la],i)=>{
          const px=projX(lo,W),py=projY(la,H);
          i===0?ctx.moveTo(px,py):ctx.lineTo(px,py);
        });
        ctx.closePath();ctx.stroke();
      });
    });
    ctx.restore();
  }
}

 });

   }
   if(!su)return;
   var isMjpeg=su.indexOf('.m3u8')<0&&(su.indexOf('cctv-ss')>-1||su.indexOf('thb.gov')>-1||su.indexOf('mjpg')>-1||su.indexOf('mjpeg')>-1);
   if(isMjpeg){
    var img=document.createElement('img');
    img.src=su;
    img.style.cssText='width:100%;display:block;min-height:200px;object-fit:cover;background:#000;';
    v.parentNode.replaceChild(img,v);
   } else if(window.Hls&&Hls.isSupported()){
    var hls=new Hls();
    hls.loadSource(su);
    hls.attachMedia(v);
    v.muted=true;
    v.play().catch(function(){});
   } else if(v.canPlayType('application/vnd.apple.mpegurl')){
    v.src=su;
    v.muted=true;
    v.play().catch(function(){});
   }
  });
 });
}

// \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550
// BOOT
// \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550
async function boot(){
  try{
    const[raw]=await Promise.all([fetchWeather(),fetchRadar()]);
    setText('\u8655\u7406\u6C23\u8C61\u8CC7\u6599\u4E2D...','\u8A08\u7B97\u8DEF\u7DDA\u8A55\u5206');
    processedRoutes=processWeather(raw);
    document.getElementById('srcLabel').textContent=weatherSrc;
    renderTabs();sel(processedRoutes[0].id);
    document.getElementById('loadScreen').classList.add('hidden');
    setTimeout(()=>document.getElementById('loadScreen').style.display='none',600);
  }catch(e){
    console.error('Boot error:',e);
    showError('\u555F\u52D5\u5931\u6557: '+e.message);
    document.getElementById('loadScreen').classList.add('hidden');
  }
}
boot();
})();
</script>

<style>
.cam-live-box{position:relative}
.wm-overlay{
  position:absolute;left:50%;top:50%;
  transform:translate(-50%,-50%);
  color:#fff;font-weight:900;
  font-size:clamp(13px,3.8vw,22px);
  letter-spacing:.5px;
  text-shadow:0 2px 6px rgba(0,0,0,.85),0 0 12px rgba(0,0,0,.7);
  background:rgba(0,0,0,.42);
  padding:6px 10px;border-radius:8px;
  pointer-events:none;z-index:5;
  white-space:nowrap;text-align:center;
  max-width:92%;
}
</style>
<script>
(function(){
  const WM_TEXT = '同氣候帶影像供參考';
  const WM_MAP = {
    feng:[1,2,3],
    leng:[1,2],
    balaka:[1,2],
    yangjin:[1,2],
    zhzheng:[1,2,3]
  };
  function getActiveRouteId(){
    const a = document.querySelector('#tabs .tab.active, #tabs .active, #tabs button.active');
    if(!a) return null;
    return a.dataset.id || a.dataset.route || a.id || (a.textContent||'').trim();
  }
  function applyWatermarks(){
    // Try to detect current route by checking which tab is active
    const activeTab = document.querySelector('#tabs .tab.active, #tabs .active, #tabs button.active, #tabs [aria-selected="true"]');
    if(!activeTab) return;
    // Match active tab text/data to known routes
    let routeId = activeTab.dataset.id || activeTab.dataset.route;
    if(!routeId){
      // Try by text content matching
      const txt = (activeTab.textContent||'').trim();
      const map = {
        '風櫃嘴':'feng',
        '冷水坑':'leng',
        '仰德小油':'yangde',
        '行義小油':'xingyi',
        '巴拉卡':'balaka',
        '陽金':'yangjin',
        '中正山':'zhzheng'
      };
      routeId = map[txt] || null;
    }
    const wmIdx = WM_MAP[routeId];
    const segs = document.querySelectorAll('#main .seg, .seg');
    segs.forEach((seg, idx)=>{
      const box = seg.querySelector('.cam-live-box');
      if(!box) return;
      const old = box.querySelector('.wm-overlay');
      if(old) old.remove();
      if(wmIdx && wmIdx.includes(idx)){
        const wm = document.createElement('div');
        wm.className = 'wm-overlay';
        wm.textContent = WM_TEXT;
        box.appendChild(wm);
      }
    });
  }
  let timer = null;
  function schedule(){
    clearTimeout(timer);
    timer = setTimeout(applyWatermarks, 120);
  }
  function init(){
    schedule();
    const main = document.querySelector('#main');
    if(main){
      new MutationObserver(schedule).observe(main, {childList:true, subtree:true});
    }
    document.addEventListener('click', e=>{
      if(e.target.closest('#tabs')) setTimeout(schedule, 200);
    });
  }
  if(document.readyState==='loading'){
    document.addEventListener('DOMContentLoaded', init);
  } else { init(); }
})();
</script>


<style>
.ptr-indicator{
  position:fixed;top:-60px;left:0;right:0;
  height:60px;display:flex;align-items:center;justify-content:center;
  color:#fff;font-size:14px;letter-spacing:1px;

  transition:transform .15s ease-out;

  width:18px;height:18px;border:2px solid rgba(255,255,255,.3);
  border-top-color:#4CAF50;border-radius:50%;
  animation:ptrspin .8s linear infinite;margin-right:8px;
}
@keyframes ptrspin{to{transform:rotate(360deg)}}
</style>
<div class="ptr-indicator" id="ptrIndicator">
  <span class="ptr-spinner" id="ptrSpinner" style="display:none"></span>
  <span id="ptrText">下拉重新整理</span>
</div>
<script>
(function(){
  // ===== 1. Pull-to-refresh on mobile =====
  let startY = 0;
  let pulling = false;
  let pullDist = 0;
  const indicator = document.getElementById('ptrIndicator');
  const indicatorText = document.getElementById('ptrText');
  const indicatorSpinner = document.getElementById('ptrSpinner');
  const THRESHOLD = 70;

  function getScrollTop(){
    return window.scrollY || document.documentElement.scrollTop || document.body.scrollTop || 0;
  }

  document.addEventListener('touchstart', e => {
    if(getScrollTop() <= 0){
      startY = e.touches[0].clientY;
      pulling = true;
      pullDist = 0;
    } else {
      pulling = false;
    }
  }, {passive:true});

  document.addEventListener('touchmove', e => {
    if(!pulling) return;
    const dy = e.touches[0].clientY - startY;
    if(dy > 0 && getScrollTop() <= 0){
      pullDist = Math.min(dy * 0.5, 120);
      indicator.style.transform = 'translateY(' + pullDist + 'px)';
      if(pullDist >= THRESHOLD){
        indicatorText.textContent = '釋放重新整理';
      } else {
        indicatorText.textContent = '下拉重新整理';
      }
    }
  }, {passive:true});

  document.addEventListener('touchend', () => {
    if(!pulling) return;
    if(pullDist >= THRESHOLD){
      indicatorText.textContent = '整理中...';
      indicatorSpinner.style.display = 'inline-block';
      indicator.style.transform = 'translateY(60px)';
      setTimeout(() => {
        location.reload();
      }, 300);
    } else {
      indicator.style.transform = 'translateY(0)';
    }
    pulling = false;
    pullDist = 0;
  }, {passive:true});

  // ===== 2. Auto refresh when user comes back =====
  let lastHidden = 0;
  const REFRESH_AFTER_MS = 30 * 1000; // 30 seconds away triggers reload
  document.addEventListener('visibilitychange', () => {
    if(document.visibilityState === 'hidden'){
      lastHidden = Date.now();
    } else if(document.visibilityState === 'visible'){
      if(lastHidden && (Date.now() - lastHidden) > REFRESH_AFTER_MS){
        location.reload();
      }
    }
  });

  // Also handle pageshow (iOS Safari bfcache)
  window.addEventListener('pageshow', e => {
    if(e.persisted){
      location.reload();
    }
  });
})();
</script>
