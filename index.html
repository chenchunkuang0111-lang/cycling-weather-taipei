.loading-overlay.hidden{opacity:0;pointer-events:none}

header{padding:16px 16px 8px;display:flex;justify-content:space-between;align-items:flex-start}

.tab{padding:10px 4px;border-radius:10px;border:1px solid var(--bdr);background:transparent;font-size:12px;font-weight:500;color:var(--fg2);cursor:pointer;text-align:center;transition:all .2s}

.day-row{display:flex;gap:6px;margin-bottom:14px}

.hero-txt{flex:1;min-width:0}.hero-txt h3{font-size:14px;font-weight:500;line-height:1.4}

.co-tag{flex-shrink:0;font-size:9px;font-weight:500;padding:3px 7px;border-radius:4px;min-width:42px;text-align:center}
.co-tag.weak{background:#3a1212;color:#EF9A9A}.co-tag.ok{background:#1b3a1b;color:#81C784}.co-tag.warn{background:#3d2f0a;color:#FFD54F}

.band{font-size:14px;font-weight:500;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center}

// API LAYER: Triple fallback weather fetching
// ═══════════════════════════════════════════════════════════════════════════════
let weatherSrc='', weatherData=null, radarData=null;
const now=new Date();

async function fetchWeather(){
  const routeArr=Object.values(ROUTES);
  const lats=routeArr.map(r=>r.lat);
  const lons=routeArr.map(r=>r.lon);
  const latStr=lats.join(',');
  const lonStr=lons.join(',');
  try{
    setText('正在連線 Open-Meteo API...','來源：api.open-meteo.com（主要來源）');
    const u='https://api.open-meteo.com/v1/forecast?latitude='+latStr+'&longitude='+lonStr+'&hourly=temperature_2m,apparent_temperature,precipitation,precipitation_probability,wind_speed_10m,wind_direction_10m,weather_code&daily=temperature_2m_max,temperature_2m_min,precipitation_sum,precipitation_probability_max,wind_speed_10m_max,wind_direction_10m_dominant,weather_code&timezone=Asia%2FTaipei&forecast_days=3';
    const r=await fetch(u,{cache:'no-store'});
    if(!r.ok)throw new Error('HTTP '+r.status);
    const d=await r.json();
    const arr=Array.isArray(d)?d:[d];
    if(arr.length===routeArr.length){weatherSrc='Open-Meteo';return arr;}
    throw new Error('Unexpected response format');
  }catch(e1){
    console.warn('Primary (Open-Meteo) failed:',e1.message);
    try{
      setText('切換 Open-Meteo 單點模式...','來源：Open-Meteo（單點重試）');
      const results=[];
      for(const r of routeArr){
        const u2='https://api.open-meteo.com/v1/forecast?latitude='+r.lat+'&longitude='+r.lon+'&hourly=temperature_2m,apparent_temperature,precipitation,precipitation_probability,wind_speed_10m,wind_direction_10m,weather_code&daily=temperature_2m_max,temperature_2m_min,precipitation_sum,precipitation_probability_max,wind_speed_10m_max,wind_direction_10m_dominant,weather_code&timezone=Asia%2FTaipei&forecast_days=3';
        const rr=await fetch(u2,{cache:'no-store'});
        if(!rr.ok)throw new Error('HTTP '+rr.status);
        results.push(await rr.json());
      }
      weatherSrc='Open-Meteo (單點)';return results;
    }catch(e2){
      console.warn('Backup 1 (Open-Meteo single) failed:',e2.message);
      try{
        setText('切換 MET Norway...','來源：api.met.no（備用）');
        const results=[];
        for(const r of routeArr){
          const u3='https://api.met.no/weatherapi/locationforecast/2.0/compact?lat='+r.lat+'&lon='+r.lon;
          const rr=await fetch(u3);
          if(!rr.ok)throw new Error('HTTP '+rr.status);
          results.push(await rr.json());
        }
        weatherSrc='MET Norway';return results;
      }catch(e3){
        console.warn('Backup 2 (MET Norway) failed:',e3.message);
        try{
          setText('切換 wttr.in...','來源：wttr.in（備用）');
          const results=[];
          for(const r of routeArr){
            const u4='https://wttr.in/'+r.lat+','+r.lon+'?format=j1';
            const rr=await fetch(u4,{cache:'no-store'});
            if(!rr.ok)throw new Error('HTTP '+rr.status);
            results.push(await rr.json());
          }
          weatherSrc='wttr.in';return results;
        }catch(e4){
          console.warn('Backup 3 (wttr.in) failed:',e4.message);
          throw new Error('All weather sources failed');
        }
      }
    }
  }
}

function fetchTimeout(url,ms){
  return Promise.race([
    fetch(url),
    new Promise((_,rej)=>setTimeout(()=>rej(new Error('Timeout')),ms))
  ]);
}

function convertWttr(results){
  // Convert wttr.in format to Open-Meteo-like hourly arrays
  return results.map(d=>{
    const cur=d.current_condition?.[0]||{};
    const forecasts=d.weather||[];
    const hourly={time:[],temperature_2m:[],apparent_temperature:[],precipitation_probability:[],wind_speed_10m:[],wind_direction_10m:[]};
    forecasts.forEach((day,di)=>{
      (day.hourly||[]).forEach(h=>{
        const dt=`${day.date}T${String(h.time).padStart(4,'0').slice(0,2)}:00`;
        hourly.time.push(dt);
        hourly.temperature_2m.push(parseFloat(h.tempC));
        hourly.apparent_temperature.push(parseFloat(h.FeelsLikeC));
        hourly.precipitation_probability.push(parseFloat(h.chanceofrain||0));
        hourly.wind_speed_10m.push(parseFloat(h.windspeedKmph));
        hourly.wind_direction_10m.push(parseFloat(h.winddirDegree));
      });
    });
    return{hourly};
  });
}

function getDefaultWeather(){
  return ROUTES.map(r=>{
    const hours=72;const hourly={time:[],temperature_2m:[],apparent_temperature:[],precipitation_probability:[],wind_speed_10m:[],wind_direction_10m:[]};
    for(let i=0;i<hours;i++){
      const d=new Date(now);d.setHours(d.getHours()+i);
      hourly.time.push(d.toISOString().slice(0,16));
      const hr=d.getHours();const t=hr>=6&&hr<=14?22+Math.sin((hr-6)/8*Math.PI)*6:18;
      hourly.temperature_2m.push(Math.round(t*10)/10);
      hourly.apparent_temperature.push(Math.round((t-2)*10)/10);
      hourly.precipitation_probability.push(hr>=14?Math.min(80,(hr-14)*12):Math.max(0,5));
      hourly.wind_speed_10m.push(Math.round((3+Math.sin(hr/6)*2)*10)/10);
      hourly.wind_direction_10m.push(180);
    }
    return{hourly};
  });
}

async function fetchRadar(){
  try{
    setText('載入降雨雷達資料...','來源：RainViewer API');
    const r=await fetchTimeout('https://api.rainviewer.com/public/weather-maps.json',8000);
    radarData=await r.json();
    const past=(radarData.radar&&radarData.radar.past)||[];
    const nowcast=(radarData.radar&&radarData.radar.nowcast)||[];
    // Store path strings (e.g. '/v2/radar/abc123')
    radarFrames=[...past,...nowcast].map(f=>f.path).filter(Boolean);
    radarHost=radarData.host||'https://tilecache.rainviewer.com';
    console.log('Radar frames loaded:',radarFrames.length,'host:',radarHost);
  }catch(e){
    console.warn('Radar fetch failed:',e.message);
    radarData=null;radarFrames=[];radarHost='';
  }
}

// DATA PROCESSING: Convert raw API → route scores & segment data
// ═══════════════════════════════════════════════════════════════════════════════
function windAlign(windDirDeg,climbBear){
  const windTo=(windDirDeg+180)%360;
  const diff=((windTo-climbBear+540)%360)-180;
  return Math.cos(diff*Math.PI/180);
}

function processWeather(raw){
  const processed=[];
  Object.values(ROUTES).forEach((route,ri)=>{
    const h=raw[ri]?.hourly;if(!h)return;
    const nowIdx=findNowIdx(h.time);
    // Build 3 day scenarios
    const days=[0,1,2].map(di=>{
      const startIdx=di===0?nowIdx:findHourIdx(h.time,di,6);
      const sliceLen=9;// 9 points = 4h at 30min intervals → use every-other hourly
      const idxs=[];for(let i=0;i<sliceLen;i++){const idx=startIdx+Math.round(i*0.5);if(idx<h.time.length)idxs.push(idx);else idxs.push(h.time.length-1);}
      const segsData=route.segs.map((seg,si)=>{
        const segIdx=idxs[Math.min(Math.round(si*2),idxs.length-1)];
        const t=Math.round(h.temperature_2m[segIdx]||22);
        const f=Math.round(h.apparent_temperature[segIdx]||t-2);
        const rain=Math.round(h.precipitation_probability[segIdx]||0);
        const ws=Math.round((h.wind_speed_10m[segIdx]||5)/3.6*10)/10;// km/h→m/s
        const wd=h.wind_direction_10m[segIdx]||180;
        const a=Math.round(windAlign(wd,seg.bear)*100)/100;
        const road=rain>=45?'wet':rain>=20?'damp':'dry';
        const pr=Math.max(10,Math.min(98,Math.round(85-rain*0.6+(a*ws*2.5)-(seg.elFrac*8))));
        // Build timeline
        const tl={rain:[],road:[],windMs:[],windAlign:[]};
        idxs.forEach(idx=>{
          const rn=Math.round(h.precipitation_probability[idx]||0);
          tl.rain.push(rn);tl.road.push(rn>=45?'wet':rn>=20?'damp':'dry');
          tl.windMs.push(Math.round((h.wind_speed_10m[idx]||5)/3.6*10)/10);
          tl.windAlign.push(Math.round(windAlign(h.wind_direction_10m[idx]||180,seg.bear)*100)/100);
        });
        const rdTxt=road==='wet'?'潮濕·降雨中':road==='damp'?'微濕·有降雨機率':'乾燥·路面狀態良好';
        const dirs=['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'];
        const wdir=dirs[Math.round(wd/22.5)%16];
        return{...seg,t,f,rain,road,rd:rdTxt,w:{ms:ws,dir:wdir,a},pr,tl};
      });
      // Overall score
      const avgRain=segsData.reduce((s,x)=>s+x.rain,0)/segsData.length;
      const avgPr=Math.round(segsData.reduce((s,x)=>s+x.pr,0)/segsData.length);
      const avgA=segsData.reduce((s,x)=>s+x.w.a,0)/segsData.length;
      const score=Math.max(15,Math.min(98,avgPr));
      const verdict=score>=80?'狀態良好，把握當前時段':score>=65?'條件中上，適合練習':score>=50?'條件一般，注意安全':score>=35?'不建議出發，路況差':'強烈不建議出發';
      const reason=`平均降雨 ${Math.round(avgRain)}%、風向對齊 ${Math.round(avgA*100)}%、破紀錄指數均值 ${avgPr}。`;
      const wl=score>=75?'最佳視窗·現在起':score>=60?'條件漸轉·把握時間':'今日條件不佳';
      const wt=score>=75?'g':score>=55?'w':'b';
      const weakest=segsData.reduce((w,s)=>s.pr<w.pr?s:w,segsData[0]);
      // Route-level timeline (use first seg's timeline as base)
      const rtl=segsData[0].tl;
      return{score,verdict,reason,windowLabel:wl,windowType:wt,segs:segsData,tl:rtl,
        surf:{state:avgRain<15?'全線偏乾':avgRain<40?'部分路段微濕':'多段潮濕',
              stateCls:avgRain<15?'good':avgRain<40?'warn':'bad',
              weakest:`${weakest.n}·破紀錄指數最低 (${weakest.pr})`,
              window:score>=70?'現在為最佳時段':'注意天氣變化',
              hazards:avgRain>=40?'降雨路滑·煞車增距':'午後雷陣雨·稜線風大'}};
    });
    processed.push({...route,days});
  });
  return processed;
}

function findNowIdx(times){
  const n=now.toISOString().slice(0,13);
  for(let i=0;i<times.length;i++){if(times[i]&&times[i].startsWith(n))return i;}
  return 0;
}
function findHourIdx(times,dayOffset,hour){
  const d=new Date(now);d.setDate(d.getDate()+dayOffset);d.setHours(hour,0,0,0);
  const target=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}T${String(hour).padStart(2,'0')}`;
  for(let i=0;i<times.length;i++){if(times[i]&&times[i].startsWith(target))return i;}
  return Math.min(dayOffset*24+hour,times.length-1);
}

function elevProfile(r, segsData){
  const W=640,H=72,pL=8,pR=8,pT=10,pB=20,iW=W-pL-pR,iH=H-pT-pB;
  const segs=r.segs;if(!segs||segs.length<2)return'';
  const pts=[];let elev=0;pts.push({km:0,elev:0});
  segs.forEach(seg=>{
    const mM=seg.m.match(/([\d.]+)[\u2013-]([\d.]+)\s*km/);
    const gM=seg.m.match(/[\u5761]\s*(\d+)%/);
    if(!mM||!gM)return;
    const kmEnd=parseFloat(mM[2]),grade=parseFloat(gM[1])/100;
    const dist=kmEnd-(pts[pts.length-1].km||0);
    elev+=dist*1000*grade;pts.push({km:kmEnd,elev});
  });
  const totalKm=pts[pts.length-1].km||r.dist||10;
  const totalElev=Math.max(pts[pts.length-1].elev,50);
  const xS=iW/totalKm,yS=iH/totalElev;
  const toX=km=>pL+km*xS,toY=e=>pT+iH-e*yS;
  const RC2={dry:'rgba(76,175,80,.55)',damp:'rgba(255,193,7,.55)',wet:'rgba(229,57,53,.55)'};
  let fills='',lines='',divs='',labels='';
  pts.forEach((p,i)=>{
    if(i===0)return;
    const prev=pts[i-1];
    const x1=toX(prev.km),x2=toX(p.km),y1=toY(prev.elev),y2=toY(p.elev),yBase=toY(0);
    const col=segsData&&segsData[i-1]?RC2[segsData[i-1].road]||RC2.dry:RC2.dry;
    fills+='<path d="M'+x1+','+y1+' L'+x2+','+y2+' L'+x2+','+yBase+' L'+x1+','+yBase+' Z" fill="'+col+'"/>';
    lines+=(i===1?'M'+x1+','+y1:'')+'L'+x2+','+y2;
    if(i<pts.length-1)divs+='<line x1="'+x2+'" y1="'+pT+'" x2="'+x2+'" y2="'+yBase+'" stroke="rgba(255,255,255,.15)" stroke-width="1"/>';
    const gM=segs[i-1].m.match(/[\u5761]\s*(\d+)%/);
    if(gM){const mx=(x1+x2)/2,my=Math.min((y1+y2)/2-4,pT+iH-8);labels+='<text x="'+mx+'" y="'+Math.max(pT+10,my)+'" text-anchor="middle" font-size="9" fill="rgba(255,255,255,.75)">'+gM[1]+'%</text>';}
  });
  const lastPt=pts[pts.length-1];
  const kmLabs='<text x="'+pL+'" y="'+(H-4)+'" font-size="9" fill="#666">0</text><text x="'+toX(lastPt.km)+'" y="'+(H-4)+'" text-anchor="end" font-size="9" fill="#666">'+lastPt.km.toFixed(1)+'km</text>';
  const elevLab='<text x="'+(W-pR)+'" y="'+(pT+9)+'" text-anchor="end" font-size="9" fill="#999">+'+Math.round(totalElev)+'m</text>';
  return '<div class="elev-card"><svg viewBox="0 0 '+W+' '+H+'" width="100%" style="display:block"><rect width="'+W+'" height="'+H+'" rx="4" fill="rgba(0,0,0,.3)"/>'+fills+'<path d="'+lines+'" fill="none" stroke="rgba(180,210,255,.8)" stroke-width="1.5" stroke-linejoin="round"/>'+divs+labels+kmLabs+elevLab+'</svg></div>';
}

function bldMap(){
  if(rMC)return;
  const z=12,TILE=256;
  const OSM_XMIN=3428,OSM_YMIN=1749,OSM_COLS=5,OSM_ROWS=5;
  function lonToTF(lo){return(lo+180)/360*Math.pow(2,z);}
  function latToTF(la){const r=la*Math.PI/180;return(1-Math.log(Math.tan(r)+1/Math.cos(r))/Math.PI)/2*Math.pow(2,z);}
  const srcX0=(lonToTF(RB.minLon)-OSM_XMIN)*TILE;
  const srcY0=(latToTF(RB.maxLat)-OSM_YMIN)*TILE;
  const srcW0=(lonToTF(RB.maxLon)-lonToTF(RB.minLon))*TILE;
  const srcH0=(latToTF(RB.minLat)-latToTF(RB.maxLat))*TILE;
  const lx=lo=>(lonToTF(lo)-OSM_XMIN)*TILE;
  const ly=la=>(latToTF(la)-OSM_YMIN)*TILE;
  const tg2cx=px=>(px-srcX0)/srcW0*RCW;
  const tg2cy=py=>(py-srcY0)/srcH0*RCH;
  window._merc={lx:lo=>tg2cx(lx(lo)),ly:la=>tg2cy(ly(la))};
  const tileW=OSM_COLS*TILE,tileH=OSM_ROWS*TILE;
  const tc=document.createElement('canvas');tc.width=tileW;tc.height=tileH;
  const tctx=tc.getContext('2d');
  tctx.fillStyle='#dde8f0';tctx.fillRect(0,0,tileW,tileH);
  rMC=document.createElement('canvas');rMC.width=RCW;rMC.height=RCH;
  const mc=rMC.getContext('2d');mc.fillStyle='#dde8f0';mc.fillRect(0,0,RCW,RCH);
  let loaded=0;const total=OSM_COLS*OSM_ROWS;
  function finish(){
    mc.drawImage(tc,srcX0,srcY0,srcW0,srcH0,0,0,RCW,RCH);
    // 底圖淡化：白色蒙版降低彩度
    mc.save();mc.globalAlpha=0.38;mc.fillStyle='#fff';mc.fillRect(0,0,RCW,RCH);mc.restore();
    const mlx=window._merc.lx,mly=window._merc.ly;

    });

    img.src='https://tile.openstreetmap.org/'+z+'/'+(OSM_XMIN+tx)+'/'+(OSM_YMIN+ty)+'.png';
  }
}

  if(!displayTime){const dd=new Date(now.getTime()+st*15*60000);displayTime=String(dd.getHours()).padStart(2,'0')+':'+String(dd.getMinutes()).padStart(2,'0');}
  ctx.fillStyle='rgba(255,255,255,.85)';ctx.font='bold 14px monospace';ctx.textAlign='left';ctx.fillText(displayTime,14,24);
  const of=st*15;ctx.fillStyle='rgba(200,220,235,.55)';ctx.font='11px sans-serif';
  ctx.fillText(st===0?'現在':'+'+( of>=60?Math.floor(of/60)+'h'+(of%60?String(of%60).padStart(2,'0')+'m':''):of+'m'),14,40);
}
function initR(rid){rAid=rid;if(rTmr){clearInterval(rTmr);rTmr=null;}rSt=0;bldMap();drF(0);
  const tk=document.getElementById('rTicks');if(tk){tk.innerHTML='';for(let i=0;i<=4;i++){const d=new Date(now.getTime()+i*3600000),s=document.createElement('span');s.textContent=`${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;tk.appendChild(s);}}
  function rb(id){const el=document.getElementById(id);if(!el)return null;const n=el.cloneNode(true);el.parentNode.replaceChild(n,el);return n;}
  const pb=rb('rPlayBtn');if(pb)pb.onclick=()=>{rPl=!rPl;pb.textContent=rPl?'⏸':'▶';if(rPl){const fCount=radarFrames.length>0?radarFrames.length:16;rTmr=setInterval(()=>{rSt=(rSt+1)%fCount;drF(rSt);updR();},800);}else{clearInterval(rTmr);rTmr=null;}};
  const sl=rb('rSlider');if(sl)sl.oninput=e=>{rPl=false;clearInterval(rTmr);rTmr=null;const p2=document.getElementById('rPlayBtn');if(p2)p2.textContent='▶';rSt=parseInt(e.target.value,10);drF(rSt);updR();};
  rPl=true;if(document.getElementById('rPlayBtn'))document.getElementById('rPlayBtn').textContent='⏸';
  rTmr=setInterval(()=>{rSt=(rSt+1)%16;drF(rSt);updR();},650);}
function updR(){
  const frameIdx=Math.min(Math.floor(rSt/16*Math.max(radarFrames.length-1,0)),radarFrames.length-1);
  let displayTime='';
  if(radarFrames.length>0&&frameIdx>=0&&radarData){
    // Get time from radarData.radar.past/nowcast
    const past=(radarData.radar&&radarData.radar.past)||[];
    const nowcast=(radarData.radar&&radarData.radar.nowcast)||[];
    const allFrames=[...past,...nowcast];
    const frameTime=allFrames[frameIdx]&&allFrames[frameIdx].time;
    if(frameTime){
      const d=new Date(frameTime*1000);
      displayTime=String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
    }
  }
  if(!displayTime){
    const dd=new Date(now.getTime()+rSt*15*60000);
    displayTime=String(dd.getHours()).padStart(2,'0')+':'+String(dd.getMinutes()).padStart(2,'0');
  }
  const te=document.getElementById('rTime');if(te)te.textContent=displayTime;
  const of=rSt*15,oe=document.getElementById('rOff');
  if(oe)oe.textContent=rSt===0?'現在':'+'+Math.floor(of/60)+'h'+(of%60?String(of%60).padStart(2,'0')+'m':'');
  const se=document.getElementById('rSlider');if(se)se.value=rSt;
  const ar=processedRoutes.find(x=>x.id===rAid);
  const rain=ar?.days[curDI]?.segs[0]?.rain||0;
  const risk=rain<10?'無降水·路況良好':rain<25?'輕雨機率·攜帶雨衣':rain<40?'降雨·路面漸濕':'大雨·不建議出發';
  const se2=document.getElementById('rStatus');if(se2)se2.innerHTML='<b>降雨 '+rain+'%</b> · '+risk;
}


// ═══════════════════════════════════════════════════════════════════════════════
// MAIN RENDER
// ═══════════════════════════════════════════════════════════════════════════════
let processedRoutes=[],curRoute=null,curDI=0;

function renderTabs(){
  const el=document.getElementById('tabs');el.innerHTML='';
  processedRoutes.forEach((r,i)=>{
    const b=document.createElement('button');
    const s=r.days[0]?.score||50;
    b.className='tab'+(i===0?' active':'');b.dataset.id=r.id;
    b.innerHTML=`${r.name}<span class="ts" style="color:${sC(s)}">${s} 分</span>`;
    b.onclick=()=>sel(r.id);el.appendChild(b);
  });
}

function sel(id){
  curRoute=processedRoutes.find(r=>r.id===id);curDI=0;
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.id===id));
  render(curRoute);
}

function render(r){
  const dts=[0,1,2].map(d=>{const dt=new Date(now);dt.setDate(dt.getDate()+d);return`${String(dt.getMonth()+1).padStart(2,'0')}/${String(dt.getDate()).padStart(2,'0')}`;});
  document.getElementById('main').innerHTML=`
<div class="route-hd"><div><h2>${r.name}</h2><div class="desc">${r.sub}</div></div><div class="stats"><span>距離<b>${r.dist}km</b></span> <span>爬升<b>${r.elev}m</b></span></div></div>
<div class="day-row">${[{i:0,n:'今天'},{i:1,n:'明天'},{i:2,n:'後天'}].map(({i,n})=>{const s=r.days[i]?.score||50;return`<button class="dbtn${curDI===i?' active':''}" data-day="${i}"><span class="dn">${n}</span><span class="ds" style="${curDI!==i?'color:'+sC(s):''}">${s}</span><span class="dd">${dts[i]}</span></button>`;}).join('')}</div>
<div class="src-info">資料來源：<b>${weatherSrc}</b> · 更新時間：${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')}</div>
<div class="card"><div class="radar-ctrl"><span id="rTime" class="radar-time">--:--</span><button id="rPlayBtn" class="play-btn">⏸</button><span id="rOff" class="radar-off">現在</span></div><div class="radar-wrap"><canvas id="rCV" width="640" height="420"></canvas></div><input type="range" id="rSlider" class="rslider" min="0" max="15" value="0" step="1"><div class="rticks" id="rTicks"></div><div id="rStatus" class="rstatus"></div></div>
<div id="day-content">${bldDay(r,curDI)}</div>`;
  document.querySelectorAll('.dbtn').forEach(btn=>{btn.onclick=()=>{curDI=parseInt(btn.dataset.day);document.querySelectorAll('.dbtn').forEach(b=>b.classList.toggle('active',parseInt(b.dataset.day)===curDI));document.getElementById('day-content').innerHTML=bldDay(r,curDI);bindSegs(r);};});
  bindSegs(r);setTimeout(()=>initR(r.id),80);
}

function bldDay(r,di){
  const day=r.days[di];if(!day)return'<p>資料載入中...</p>';
  const sc=day,dn=Math.round(sc.segs.filter(s=>s.road==='dry').length/sc.segs.length*100);
  const wc=sc.windowType;const tlL=di===0?'現在起 4 小時':di===1?'明天 06:00–10:00':'後天 06:00–10:00';
  const tb=di===0?now:(()=>{const d=new Date(now);d.setDate(d.getDate()+di);d.setHours(6,0,0,0);return d;})();
  const segsH=sc.segs.map((s,i)=>{
    const k=kOf(s.w.a),p=Math.round(Math.abs(s.w.a)*100),pd=s.pr>=85?{t:'絕佳',c:'g'}:s.pr>=70?{t:'良好',c:'g'}:s.pr>=55?{t:'中等',c:'w'}:s.pr>=40?{t:'不建議',c:'w'}:{t:'避免',c:'b'};
    const ht=s.tl?chint(s.tl.road):'';
    const wf=k==='tail'?`left:50%;width:${p/2}%;`:k==='head'?`left:${50-p/2}%;width:${p/2}%;`:'left:48%;width:4%;';
    const cb=s.cam?`<button class="sbtn cam" data-cam="${s.cam.url}"><span class="dot"></span>${s.cam.name}</button>`:`<button class="sbtn" disabled><span class="dot" style="background:#666"></span>無攝影機</button>`;
    return`<div class="seg">
<div class="seg-top"><div><p class="seg-name">${s.n}</p><span class="seg-meta">${s.m}</span></div><div class="temp-blk"><span class="big">${s.t}°</span><span class="sm">體感 ${s.f}°</span></div></div>
<div class="wind-ind"><div class="wind-row"><span class="wtag ${k}">${wL(k)} ${p}%</span><span class="wspeed">${s.w.ms} m/s · ${s.w.dir}</span></div><div class="wbar"><div class="wbar-c"></div><div class="wfill ${k}" style="${wf}"></div></div><div class="wscale"><span>← 逆風</span><span>0</span><span>順風 →</span></div></div>
<div class="road-box"><div class="road-hdr"><div class="road-lbl"><span>路面</span><span class="pill ${s.road==='dry'?'g':s.road==='damp'?'w':'b'}">${RT[s.road]}</span></div><span class="road-rain">降雨 ${s.rain}%</span></div><div class="road-desc">${s.rd}</div><div class="tl-period">${tlL}</div>${sTL(s,tb,di)}<div class="tl-leg"><span><span class="tl-sw" style="background:#4CAF50"></span>乾</span><span><span class="tl-sw" style="background:#FFC107"></span>微濕</span><span><span class="tl-sw" style="background:#E53935"></span>潮濕</span><span><span class="tl-sw" style="background:#7E57C2"></span>風速</span></div>${ht?`<div class="tl-hint"><b>${ht}</b></div>`:''}<div class="note"><b>騎乘備注：</b>${s.rd}</div><div class="tr-box"><b>🚗 交通路況：</b>${s.tr}</div></div>
<div class="pr-line"><span class="pr-lbl">破紀錄指數</span><div class="pr-body"><span class="pr-val">${s.pr}</span><span class="pill ${pd.c}">${pd.t}</span></div></div>
<div class="gear-box"><span class="tag">服裝</span><span class="txt">${gear(s.f,s.rain)}</span></div>
<div class="seg-foot">${cb}<button class="sbtn" data-detail="${i}">展開分析 →</button></div></div>`;}).join('');
  return`<div class="hero"><div class="score-ring">${sRing(sc.score)}<div class="score-num">${sc.score}</div></div><div class="hero-txt"><h3>${sc.verdict}</h3><p class="reason">${sc.reason}</p><span class="wchip ${wc}">${sc.windowLabel}</span></div></div>
<div class="card"><div class="card-head"><h4>${r.name} 全線路面</h4><span class="pill ${sc.surf.stateCls==='good'?'g':sc.surf.stateCls==='warn'?'w':'b'}">${sc.surf.state}</span></div><div class="metrics"><div class="metric"><span class="lbl">目前乾段占比</span><span class="val">${dn}%</span><div class="mbar"><div class="mfill" style="width:${Math.max(3,dn)}%;background:${dn>=75?'#4CAF50':dn>=40?'#FFC107':'#E53935'}"></div></div></div><div class="metric"><span class="lbl">最薄弱路段</span><span class="val" style="font-size:12px">${sc.surf.weakest}</span></div></div><div class="callouts"><div class="co"><span class="co-tag ok">視窗</span><span>${sc.surf.window}</span></div><div class="co"><span class="co-tag warn">風險</span><span>${sc.surf.hazards}</span></div></div></div>
<div class="band">分區段推演 <span class="hint">${sc.segs.length} 段 · ${tlL}</span></div>
${elevProfile(r, sc.segs)}
<div class="seg-list">${segsH}</div>`;
}

function bindSegs(r){
  document.querySelectorAll('[data-cam]').forEach(btn=>{btn.onclick=()=>window.open(btn.dataset.cam,'_blank');});
  document.querySelectorAll('[data-detail]').forEach(btn=>{btn.onclick=()=>{
    const s=r.days[curDI]?.segs[parseInt(btn.dataset.detail)];
    if(s)alert(`${r.name} · ${s.n}\n\n破紀錄指數: ${s.pr}/100\n溫度: ${s.t}°C (體感 ${s.f}°)\n降雨機率: ${s.rain}%\n風速: ${s.w.ms} m/s ${s.w.dir}\n路面: ${RT[s.road]}\n\n交通路況:\n${s.tr}`);};});
}

// ═══════════════════════════════════════════════════════════════════════════════
// BOOT
// ═══════════════════════════════════════════════════════════════════════════════
async function boot(){
  try{
    const[raw]=await Promise.all([fetchWeather(),fetchRadar()]);
    setText('處理氣象資料中...','計算路線評分');
    processedRoutes=processWeather(raw);
    document.getElementById('srcLabel').textContent=weatherSrc;
    renderTabs();sel(processedRoutes[0].id);
    document.getElementById('loadScreen').classList.add('hidden');
    setTimeout(()=>document.getElementById('loadScreen').style.display='none',600);
  }catch(e){
    console.error('Boot error:',e);
    showError('啟動失敗: '+e.message);
    document.getElementById('loadScreen').classList.add('hidden');
  }
}
boot();
})();
</script>
</body>
</html>
